name: Daily Results Update
on:
  schedule:
    - cron: '30 21 * * *'  # 23:30 Belgrade time (UTC+2)
    - cron: '30 22 * * *'  # 00:30 Belgrade time (next day catch-up)
  workflow_dispatch:

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: ./server
        run: npm install
      - name: Update results
        working-directory: ./server
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node -e "import('./engine/results-updater.mjs').then(m => m.updateResults().then(r => { console.log(JSON.stringify(r, null, 2)); process.exit(0) }))"
